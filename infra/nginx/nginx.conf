worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Sensitive auth endpoints: 5 requests per minute per IP.
    # Intentionally tight to slow brute-force on login and register.
    limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=1r/s;
    # All other routes: 30 requests per second per IP.
    limit_req_zone $binary_remote_addr zone=default:10m rate=30r/s;

    limit_req_status 429;

    log_format main '$remote_addr - $request '
                    '$status $body_bytes_sent '
                    '"$http_x_request_id"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    upstream auth {
        server auth:4001;
    }

    upstream wallet {
        server wallet:4002;
    }

    upstream transactions {
        server transactions:4003;
    }

    upstream kyc {
        server kyc:4004;
    }

    upstream analytics {
        server analytics:4005;
    }

    upstream notifications {
        server notifications:4006;
    }

    upstream social {
        server social:4007;
    }

    upstream admin {
        server admin:4009;
    }

    upstream web {
        server web:3000;
    }

    server {
        listen 80;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;

        set $cors_origin "";
        if ($http_origin ~* "^http://localhost(:[0-9]+)?$") {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"        always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Request-Id, Idempotency-Key" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        location = /api/v1/auth/login {
            limit_req zone=auth_strict burst=5 nodelay;
            proxy_pass http://auth;
        }

        location = /api/v1/auth/register {
            limit_req zone=auth_strict burst=5 nodelay;
            proxy_pass http://auth;
        }

        location /api/v1/auth/ {
            limit_req zone=default burst=20 nodelay;
            proxy_pass http://auth;
        }

        location /api/v1/wallet/ {
            limit_req zone=default burst=20 nodelay;
            proxy_pass http://wallet;
        }

        location /api/v1/transactions/ {
            limit_req zone=default burst=20 nodelay;
            proxy_pass http://transactions;
        }

        location /api/v1/kyc/ {
            limit_req zone=default burst=20 nodelay;
            proxy_pass http://kyc;
        }

        location /api/v1/analytics/ {
            limit_req zone=default burst=20 nodelay;
            proxy_pass http://analytics;
        }

        location /api/v1/social/ {
            limit_req zone=default burst=20 nodelay;
            proxy_pass http://social;
        }

        location /api/v1/notifications/ {
            limit_req zone=default burst=20 nodelay;
            proxy_pass http://notifications;

            # SSE-specific: disable buffering so events stream immediately
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }
       
        location /app-admin/ {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }

        location /admin/ {
            limit_req zone=default burst=10 nodelay;
            proxy_pass http://admin;
        }
                

        location = /health {
            access_log off;
            return 200 "yo chill its working\n";
            add_header Content-Type text/plain;
        }

        # Next.js HMR websocket and static assets
        location /_next/ {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Next.js - catch-all, must be last
        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
