  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile.dev
    container_name: mint-admin
    networks: [mint]
    ports:
      - '4009:4009'
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      AUTH_JWKS_URL: http://auth:4001/.well-known/jwks.json
      AUTH_SERVICE_URL: http://auth:4001
      WALLET_GRPC_URL: wallet:50051
      KYC_GRPC_URL: kyc:50053
      FRAUD_GRPC_URL: fraud:50052
      TRANSACTIONS_SERVICE_URL: http://transactions:4003
      AUDIT_SERVICE_URL: http://audit:4010
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      CHOKIDAR_INTERVAL: 1000
      # TODO: add user ids (comma separated) that have admin access
      ADMIN_USER_IDS: 'qmq0nb3e15fo1uwlu6pdejkj'
      OTEL_SERVICE_NAME: admin-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
    volumes:
      - ./apps/admin/src:/app/apps/admin/src
      - ./libs/common/src:/app/libs/common/src
      - ./libs/proto:/app/libs/proto
      - /app/node_modules
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      wallet:
        condition: service_started
      kyc:
        condition: service_started
      fraud:
        condition: service_started
    restart: on-failure

  audit:
    build:
      context: .
      dockerfile: apps/audit/Dockerfile.dev
    container_name: mint-audit
    networks: [mint]
    ports:
      - '4010:4010'
    environment:
      DATABASE_URL: postgresql://mint_audit_user:mint_audit_pass@postgres:5432/mint_audit
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      AUTH_JWKS_URL: http://auth:4001/.well-known/jwks.json
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      CHOKIDAR_INTERVAL: 1000
      OTEL_SERVICE_NAME: audit-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
    volumes:
      - ./apps/audit/src:/app/apps/audit/src
      - /app/apps/audit/src/generated
      - ./apps/audit/prisma:/app/apps/audit/prisma
      - ./libs/common/src:/app/libs/common/src
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      audit-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: on-failure

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: mint-otel-collector
    networks: [mint]
    ports:
      - '4317:4317'
      - '4318:4318'
    volumes:
      - ./infra/otel/otel-collector.yml:/etc/otel-collector.yml:ro
    command: ['--config=/etc/otel-collector.yml']
    depends_on:
      - tempo
    restart: on-failure

  tempo:
    image: grafana/tempo:2.4.1
    container_name: mint-tempo
    networks: [mint]
    ports:
      - '3200:3200'
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo.yml:ro
    command: ['-config.file=/etc/tempo.yml']
    restart: on-failure

  grafana:
    image: grafana/grafana:10.4.3
    container_name: mint-grafana
    networks: [mint]
    ports:
      - '4000:3000'
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - tempo
    restart: on-failure

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile.dev
    container_name: mint-web
    networks: [mint]
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
      NODE_ENV: development
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    working_dir: /app
    command: pnpm dev --port 3000 --webpack
    restart: on-failure

volumes:
  postgres-data:
  redis-data:
  minio-data:
  web_node_modules:
  web_next:

networks:
  mint:
    driver: bridge
