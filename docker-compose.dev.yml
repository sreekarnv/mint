name: "mint-dev"

services:
  nginx:
    image: nginx:1.29-alpine
    container_name: mint-nginx
    networks: [mint]
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - wallet
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:18.3-alpine
    container_name: mint-postgres
    networks: [mint]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: mint-dev
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: on-failure

  auth-migrate:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: mint-auth-migrate
    networks: [mint]
    environment:
      ENV_FILENAME: ".env.development"
    volumes:
      - ./services/auth/src:/app/services/auth/src
      - ./shared-py:/app/shared-py
      - ./services/auth/.env:/app/services/auth/.env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uv", "run", "migrate"]
    restart: no

  wallet-migrate:
    build:
      context: .
      dockerfile: services/wallet/Dockerfile
    container_name: mint-wallet-migrate
    networks: [mint]
    environment:
      ENV_FILENAME: ".env.development"
    volumes:
      - ./services/wallet/src:/app/services/wallet/src
      - ./shared-py:/app/shared-py
      - ./services/wallet/.env:/app/services/wallet/.env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uv", "run", "migrate"]
    restart: no

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: mint-auth
    networks: [mint]
    ports:
      - "4001:4001"
    environment:
      ENV_FILENAME: ".env.development"
    volumes:
      - ./services/auth/src:/app/services/auth/src
      - ./shared-py:/app/shared-py
      - ./services/auth/.env.development:/app/services/auth/.env.development
    restart: on-failure

  wallet:
    build:
      context: .
      dockerfile: services/wallet/Dockerfile
    container_name: mint-wallet
    networks: [mint]
    ports:
      - "4002:4002"
    environment:
      ENV_FILENAME: ".env.development"
    volumes:
      - ./services/wallet/src:/app/services/wallet/src
      - ./shared-py:/app/shared-py
      - ./services/wallet/.env.development:/app/services/wallet/.env.development
    restart: on-failure

volumes:
  postgres-data:

networks:
  mint:
    driver: bridge
