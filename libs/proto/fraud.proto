syntax = "proto3";

package fraud;

service FraudService {
  rpc ScoreTransaction (ScoreRequest) returns (ScoreResponse);
  rpc ListReviewQueue (ListReviewQueueRequest) returns (ListReviewQueueResponse);
}

message ScoreRequest {
  string transaction_id      = 1;
  string user_id             = 2;
  string recipient_id        = 3;
  int64  amount_cents        = 4;
  string currency            = 5;
  string ip_address          = 6;
  string transaction_type    = 7;
  string user_country        = 8;
  bool   recipient_is_contact = 9;
  string sender_currency     = 10;
  string recipient_currency  = 11;
  int64  usd_equivalent_cents = 12;
}

message ScoreResponse {
    // ALLOW | REVIEW | BLOCK
  string decision            = 1;
  int32  score               = 2;
  repeated string rules_fired = 3;
  string reason              = 4;
}

message ListReviewQueueRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message FraudQueueItem {
  string case_id = 1;
  string transaction_id = 2;
  string user_id = 3;
  int32  score = 4;
  repeated string rules_fired = 5;
  string created_at = 6;
}

message ListReviewQueueResponse {
  repeated FraudQueueItem items = 1;
  int32 total = 2;
}
